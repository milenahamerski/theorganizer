<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TheOrganizer - Sua Estante Pessoal ✨</title>
    <link rel="icon" type="image/png" href="/static/logo.png" />
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <header>
      <img src="/static/logo.png" alt="TheOrganizer Logo" />
      <h1>TheOrganizer</h1>
    </header>

    <main class="main-container">
      <section class="section-card">
        <h2>Adicionar à minha estante</h2>
        <form id="book-form">
          <input type="text" id="title" placeholder="Título do livro" required />
          <input type="text" id="author" placeholder="Nome da autora" required />
          <input type="number" id="year" placeholder="Ano de lançamento" />
          <input type="text" id="image_url" placeholder="URL da capa do livro" />
          <button type="submit">Guardar com carinho ✨</button>
        </form>
      </section>

      <section class="section-card">
        <h2>Meus Tesouros</h2>
        <div id="book-list">
          <!-- Livros serão carregados aqui -->
        </div>
      </section>
    </main>

    <script src="/static/script.js"></script>
  </body>
</html>
